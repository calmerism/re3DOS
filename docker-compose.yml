services:
  re3dos:
    hostname: re3DOS
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${OUT_HOST-0.0.0.0}:${OUT_PORT-8001}:${IN_PORT-8001}"
    volumes:
      - .:/app
    networks:
      - default
    environment:
      - AUTH_LOGIN=${AUTH_LOGIN:-}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - CUSTOM_SAVES=${CUSTOM_SAVES:-}
      - IN_PORT=${IN_PORT:-8001}
      - RE3SKY_LOCAL=${RE3SKY_LOCAL:-}
      - RE3BR_LOCAL=${RE3BR_LOCAL:-}
      - RE3SKY_URL=${RE3SKY_URL:-}
      - RE3BR_URL=${RE3BR_URL:-}
      - RE3SKY_CACHE=${RE3SKY_CACHE:-}
      - RE3BR_CACHE=${RE3BR_CACHE:-}
      - PACKED=${PACKED:-}
      - UNPACKED=${UNPACKED:-}
      - PACK=${PACK:-}
    command: >
      sh -c "python server.py
      --port $${IN_PORT:-8001}
      $$([ -n \"$$AUTH_LOGIN\" ] && [ -n \"$$AUTH_PASSWORD\" ] && echo \"--login $$AUTH_LOGIN --password $$AUTH_PASSWORD\" || echo '')
      $$([ \"$$CUSTOM_SAVES\" = '1' ] && echo '--custom_saves' || echo '')
      $$(if [ \"$$RE3SKY_LOCAL\" = '1' ]; then echo '--re3sky_local'; elif [ -n \"$$RE3SKY_LOCAL\" ]; then echo \"--re3sky_local $$RE3SKY_LOCAL\"; fi)
      $$(if [ \"$$RE3BR_LOCAL\" = '1' ]; then echo '--re3br_local'; elif [ -n \"$$RE3BR_LOCAL\" ]; then echo \"--re3br_local $$RE3BR_LOCAL\"; fi)
      $$([ -n \"$$RE3SKY_URL\" ] && echo \"--re3sky_url $$RE3SKY_URL\" || echo '')
      $$([ -n \"$$RE3BR_URL\" ] && echo \"--re3br_url $$RE3BR_URL\" || echo '')
      $$([ \"$$RE3SKY_CACHE\" = '1' ] && echo '--re3sky_cache' || echo '')
      $$([ \"$$RE3BR_CACHE\" = '1' ] && echo '--re3br_cache' || echo '')
      $$([ -n \"$$PACKED\" ] && echo \"--packed $$PACKED\" || echo '')
      $$([ -n \"$$UNPACKED\" ] && echo \"--unpacked $$UNPACKED\" || echo '')
      $$([ -n \"$$PACK\" ] && echo \"--pack $$PACK\" || echo '')"
    restart: unless-stopped
